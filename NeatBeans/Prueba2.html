<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<style>
			canvas {border:1px solid;}
		</style>
 
		<script>
		window.onload=function()
		{
			var elemento=document.getElementById("canvas");

			elemento.onclick = function(e) {
 
				// El contenido de esta funcion se ejecutara cuanso el mouse
				// pase por encima del elemento
 
				document.getElementById("estado").innerHTML="El ratón esta encima del recuadro";
				document.body.style.background = "#773134"
			};
			elemento.ondblclick = function(e) {
 
				// El contenido de esta funcion se ejecutara cuanso el mouse
				// salga del elemento
 
				document.getElementById("estado").innerHTML="El ratón NO esta encima del recuadro";
				document.body.style.background = "#303134"
			};
		}
		
		</script>
	</head>
 
	<body>
		<h1>The fieldset element</h1>
<div style="text-align:center;padding:1em 0;"> <h4><a style="text-decoration:none;" href="https://www.zeitverschiebung.net/es/city/3573890">
  <span style="color:gray;">Hora actual en</span><br />Port of Spain, Trinidad y Tobago</a></h4> <iframe src="https://www.zeitverschiebung.net/clock-widget-iframe-v2?language=es&size=small&timezone=America%2FPort_of_Spain" width="100%" height="90" frameborder="0" seamless></iframe> </div>
<form>
 <fieldset>
  <legend>Personalia:</legend>
  <label for="fname">Usuario:</label>
  <input type="text" id="fname" name="fname"><br><br>
  <label for="password">Contraseña:</label>
  <input type="password" id="password" name="password" minlength="8"><br><br>
  <label for="email">Email:</label>
  <input type="email" id="email" name="email"><br><br>
  <button onmouseover="myFunction()">
    Enviar
  </button>
 </fieldset>
		<canvas id="canvas" width="200" height="200">
		</canvas>
 
		<div id="estado">El ratón NO esta encima del recuadro</div>
	</body>
</html>
